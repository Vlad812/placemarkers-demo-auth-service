x-app-environment: &app-environment
  APP_ENV: dev
  APP_SECRET: b794fd4f2ec8c1220967cd84439d4a13
  DEFAULT_URI: http://localhost
  DATABASE_URL: "postgresql://my_postgres:postgres@cs-pg-auth:5432/placemarkers_user_db?serverVersion=17&charset=utf8"
  JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
  JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
  JWT_PASSPHRASE: ""
  REFRESH_TOKEN_TTL: 2592000
  MESSENGER_TRANSPORT_DSN: "amqp://my_rabbit:rabbit@cs-rabbitmq:5672/placemarkers/email_notifier"

services:
  auth-service-cli:
    image: auth-service-cli-image
    container_name: auth-service-cli
    build:
      context: .
      dockerfile: ./Docker/php/cli/Dockerfile
    environment:
      <<: *app-environment
      COMPOSER_HTTP_TIMEOUT: 600
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    networks:
      - place_markers_net

  # Основной сервис с RoadRunner
  auth-service-app:
    image: auth-service-app-image
    container_name: auth-service-app
    build:
      dockerfile: ./Docker/RR/Dockerfile
    volumes:
      - ./app:/var/www/html
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=place_markers_net"
      - "traefik.http.routers.auth-service-app.rule=Host(`api.placemarkers.local`) && PathRegexp(`^/(login|logout|refresh|signup|forgot-password|reset-password|confirm-email/.+)$`)"
      - "traefik.http.routers.auth-service-app.entrypoints=web"
      - "traefik.http.routers.auth-service-app.priority=100"
      - "traefik.http.services.auth-service-app.loadbalancer.server.port=8080"
    environment:
      <<: *app-environment
      VAR_DUMPER_FORMAT: 'server'
      VAR_DUMPER_SERVER: 'buggregator:9912'
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - place_markers_net

networks:
  place_markers_net:
    external: true
